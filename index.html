<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#EA580C">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>RecipeCalc - Recipe Cost Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-top">
                <div class="logo"><span class="logo-icon">&#127859;</span><span class="logo-text">RecipeCalc</span></div>
                <button class="icon-btn" id="btnLang">&#127760;</button>
            </div>
        </header>
        <main>
            <!-- Recipe List -->
            <div id="recipeList" class="recipe-list"></div>
            <button class="add-btn" id="btnAddRecipe">+ <span data-i18n="new_recipe">New Recipe</span></button>
            <!-- Ingredient Pantry -->
            <div class="pantry-section">
                <h3 data-i18n="ingredient_pantry">Ingredient Pantry</h3>
                <div id="pantryList" class="pantry-list"></div>
                <button class="add-pantry-btn" id="btnAddIngredient">+ <span data-i18n="add_ingredient">Add Ingredient</span></button>
            </div>
        </main>
        <!-- Recipe Editor Modal -->
        <div class="modal-overlay" id="modalRecipe" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="recipeModalTitle" data-i18n="new_recipe">New Recipe</h3>
                    <button class="close-btn" id="btnCloseRecipe">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label data-i18n="recipe_name">Recipe Name</label>
                        <input type="text" id="inputRecipeName" class="form-input" placeholder="e.g. Chocolate Cake">
                    </div>
                    <div class="form-group">
                        <label data-i18n="servings">Servings</label>
                        <input type="number" id="inputServings" class="form-input" value="4" min="1">
                    </div>
                    <div class="form-group">
                        <label data-i18n="sell_price">Sell Price ($)</label>
                        <input type="number" id="inputSellPrice" class="form-input" placeholder="0.00" step="0.01" min="0">
                    </div>
                    <h4 data-i18n="ingredients" style="margin:16px 0 10px;font-size:14px;">Ingredients</h4>
                    <div id="ingredientRows" class="ingredient-rows"></div>
                    <button class="add-row-btn" id="btnAddIngredientRow">+ <span data-i18n="add_ingredient">Add</span></button>
                    <div class="cost-summary" id="costSummary"></div>
                    <button class="primary-btn" id="btnSaveRecipe" data-i18n="save">Save</button>
                </div>
            </div>
        </div>
        <!-- Add Pantry Ingredient Modal -->
        <div class="modal-overlay" id="modalPantry" style="display:none;">
            <div class="modal">
                <div class="modal-header">
                    <h3 data-i18n="add_ingredient">Add Ingredient</h3>
                    <button class="close-btn" id="btnClosePantry">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label data-i18n="ingredient_name">Name</label>
                        <input type="text" id="inputPantryName" class="form-input" placeholder="e.g. Flour">
                    </div>
                    <div class="form-row">
                        <div class="form-group half">
                            <label data-i18n="unit_price">Price ($)</label>
                            <input type="number" id="inputPantryPrice" class="form-input" placeholder="0.00" step="0.01">
                        </div>
                        <div class="form-group half">
                            <label data-i18n="unit_size">Size</label>
                            <input type="text" id="inputPantryUnit" class="form-input" placeholder="e.g. 5 kg">
                        </div>
                    </div>
                    <button class="primary-btn" id="btnSavePantry" data-i18n="save">Save</button>
                </div>
            </div>
        </div>
        <!-- Language Modal -->
        <div class="modal-overlay" id="modalLang" style="display:none;">
            <div class="modal modal-sm">
                <div class="modal-header"><h3 data-i18n="language">Language</h3><button class="close-btn" id="btnCloseLang">&times;</button></div>
                <div class="modal-body">
                    <button class="lang-btn" data-lang="en">English</button>
                    <button class="lang-btn" data-lang="zh">&#20013;&#25991;</button>
                    <button class="lang-btn" data-lang="es">Espa&#241;ol</button>
                    <button class="lang-btn" data-lang="ja">&#26085;&#26412;&#35486;</button>
                    <button class="lang-btn" data-lang="de">Deutsch</button>
                    <button class="lang-btn" data-lang="fr">Fran&#231;ais</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
    if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
    </script>
</body>
</html>
